<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Beyond Chatbots: Shipping Stateful AI Agents on AWS</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/github.min.css" />
    <style>
      :root {
        --blue: #00aced;
        --text: #353535;
        --link: #0000ee;
        --bg: #ffffff;
        --muted: #6b7280;
        --maxw: 960px;
        --padx: 1.0875rem;
        --pady: 1.45rem;
        --code-bg: #f6f8fa;
        --border: #e5e7eb;
        --accent: #2563eb;
      }
      html, body { height: 100%; }
      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font-family: georgia, serif;
        font-size: 18px;
        line-height: 1.6;
      }
      a { color: var(--link); }
      header.site { background: var(--blue); margin-bottom: var(--pady); }
      .nav {
        margin: 0 auto; max-width: var(--maxw); padding: var(--pady) var(--padx);
        display: flex; align-items: center; justify-content: space-between;
        gap: 1rem; flex-wrap: wrap;
      }
      .brand { display: flex; align-items: baseline; gap: 0.5rem; flex-wrap: wrap; }
      .brand a {
        color: #fff; text-decoration: none;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu, Cantarell, "Fira Sans", "Droid Sans", "Helvetica Neue", sans-serif;
        font-weight: 700;
      }
      .brand a.meta { font-weight: 600; opacity: 0.95; }
      .social { display: flex; gap: 0.5rem; align-items: center; }
      .social a {
        display: inline-flex; align-items: center; justify-content: center;
        width: 28px; height: 28px; border-radius: 999px;
        background: rgba(255,255,255,0.15); text-decoration: none; color: #fff;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        font-size: 13px; font-weight: 700; line-height: 1;
      }
      .wrap { margin: 0 auto; max-width: var(--maxw); padding: 0 var(--padx) var(--pady); }
      .deck { position: relative; min-height: calc(100vh - 140px); }
      section.slide { display: none; padding-bottom: 5rem; }
      section.slide.active { display: block; }
      h1, h2, h3 {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu, Cantarell, "Fira Sans", "Droid Sans", "Helvetica Neue", sans-serif;
        line-height: 1.15; margin: 1.2rem 0 0.75rem;
      }
      h1 { font-size: 40.5px; margin-top: 0.25rem; }
      h2 { font-size: 29.28px; }
      h3 { font-size: 22px; color: var(--accent); }
      .meta-line {
        display: flex; flex-wrap: wrap; gap: 0.5rem; align-items: center;
        color: var(--muted); font-size: 14px; margin: 0.25rem 0 1rem;
      }
      .pill { border: 1px solid var(--border); padding: 0.1rem 0.5rem; border-radius: 999px; background: #fff; }
      .grid2 { display: grid; grid-template-columns: 1fr; gap: 1rem; }
      @media (min-width: 700px) { .grid2 { grid-template-columns: 1fr 1fr; } }
      .grid3 { display: grid; grid-template-columns: 1fr; gap: 1rem; }
      @media (min-width: 700px) { .grid3 { grid-template-columns: 1fr 1fr 1fr; } }
      .callout { border-left: 4px solid var(--blue); padding: 0.75rem 1rem; background: #f8fafc; margin: 1rem 0; }
      .card { border: 1px solid var(--border); border-radius: 8px; padding: 1rem 1.25rem; background: #fff; }
      .code {
        background: var(--code-bg); border: 1px solid var(--border);
        padding: 0.75rem 1rem; overflow: auto;
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
        font-size: 14px; line-height: 1.5;
      }
      .code pre { margin: 0; white-space: pre-wrap; word-wrap: break-word; }
      .code code { background: none; padding: 0; }
      svg { max-width: 100%; height: auto; display: block; margin: 1rem auto; }
      .note {
        margin-top: 1rem; padding-top: 0.75rem;
        border-top: 1px dashed var(--border); color: var(--muted); font-size: 14px;
      }
      .footer-nav {
        position: fixed; left: 0; right: 0; bottom: 0;
        background: rgba(255,255,255,0.96); border-top: 1px solid var(--border);
        backdrop-filter: blur(6px);
      }
      .footer-nav .inner {
        margin: 0 auto; max-width: var(--maxw); padding: 0.75rem var(--padx);
        display: flex; align-items: center; justify-content: space-between;
        gap: 0.75rem; flex-wrap: wrap;
      }
      .btn {
        display: inline-flex; align-items: center; justify-content: center; gap: 0.5rem;
        padding: 0.45rem 0.7rem; border: 1px solid var(--border); background: #fff;
        text-decoration: none; color: var(--text); cursor: pointer;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        font-size: 14px;
      }
      .btn.primary { border-color: rgba(0,172,237,0.55); }
      .kbd {
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
        font-size: 12px; border: 1px solid var(--border); padding: 0.05rem 0.35rem; background: #fff;
      }
      .progress { flex: 1; min-width: 180px; height: 8px; background: #eef2f7; border: 1px solid var(--border); position: relative; }
      .progress > span { position: absolute; left: 0; top: 0; bottom: 0; background: var(--blue); width: 0%; transition: width 0.3s; }
      .title-slide { text-align: center; padding-top: 3rem; }
      .title-slide h1 { font-size: 48px; }
      .title-slide h2 { font-weight: 600; margin-top: 0.4rem; }
      .slide-num {
        position: absolute; top: 0.5rem; right: 0.5rem;
        color: var(--muted); font-size: 13px;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      }
      section.slide { position: relative; }
      @media print {
        header.site, .footer-nav { display: none; }
        section.slide { display: block !important; page-break-after: always; }
        .deck { min-height: auto; }
      }
    </style>
  </head>
  <body>
    <header class="site">
      <div class="nav">
        <div class="brand">
          <a href="#s1">Martin Mueller's Blog</a>
          <a class="meta" href="#" id="qa-link">|| Q&A</a>
        </div>
        <div class="social" aria-label="Social">
          <a href="https://martinmueller.dev" target="_blank" rel="noopener">MM</a>
          <a href="https://ai-secure.dev" target="_blank" rel="noopener">AS</a>
          <a href="https://linkedin.com/in/martinmueller88" target="_blank" rel="noopener">LI</a>
        </div>
      </div>
    </header>

    <main class="wrap">
      <div class="deck" id="deck"></div>
    </main>

    <div class="footer-nav" role="navigation" aria-label="Slide navigation">
      <div class="inner">
        <a class="btn primary" href="#s1">Home</a>
        <div class="progress" aria-hidden="true"><span id="progress-bar"></span></div>
        <div style="display:inline-flex;gap:0.5rem;align-items:center;flex-wrap:wrap">
          <span style="color:var(--muted);font-size:14px">Use <span class="kbd">←</span> / <span class="kbd">→</span></span>
          <a class="btn" id="prev" href="#s1">Prev</a>
          <a class="btn" id="next" href="#s2">Next</a>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js"></script>
    <script src="content.js"></script>
    <script>
      const deck = document.getElementById('deck');

      function esc(str) {
        const d = document.createElement('div');
        d.textContent = str;
        return d.innerHTML;
      }

      function renderSlide(slide, idx) {
        const id = `s${idx + 1}`;
        const sec = document.createElement('section');
        sec.className = 'slide';
        sec.id = id;
        const layout = slide.layout || 'default';

        let html = '';

        if (layout === 'title') {
          sec.classList.add('title-slide');
          html += `<h1>${esc(slide.title)}</h1>`;
          if (slide.subtitle) html += `<h2>${esc(slide.subtitle)}</h2>`;
          if (slide.section) {
            html += `<div class="meta-line" style="justify-content:center;margin-top:1rem">`;
            html += `<span class="pill">${esc(slide.section)}</span>`;
            html += `</div>`;
          }
          if (slide.html) html += slide.html;
        } else if (layout === 'diagram') {
          html += `<h1>${esc(slide.title)}</h1>`;
          if (slide.subtitle) html += `<p style="color:var(--muted)">${esc(slide.subtitle)}</p>`;
          if (slide.svg) html += slide.svg;
          if (slide.bullets && slide.bullets.length) {
            html += `<ul>${slide.bullets.map(b => `<li>${esc(b)}</li>`).join('')}</ul>`;
          }
          if (slide.html) html += slide.html;
        } else if (layout === 'three-column' && slide.cols) {
          html += `<h1>${esc(slide.title)}</h1>`;
          if (slide.subtitle) html += `<p style="color:var(--muted)">${esc(slide.subtitle)}</p>`;
          html += `<div class="grid3">`;
          slide.cols.forEach(col => {
            html += `<div class="card"><h3>${esc(col.title)}</h3>`;
            if (col.bullets && col.bullets.length) {
              html += `<ul>${col.bullets.map(b => `<li>${esc(b)}</li>`).join('')}</ul>`;
            }
            html += `</div>`;
          });
          html += `</div>`;
        } else if ((layout === 'two-column' || layout === 'default') && slide.cols) {
          html += `<h1>${esc(slide.title)}</h1>`;
          if (slide.subtitle) html += `<p style="color:var(--muted)">${esc(slide.subtitle)}</p>`;
          html += `<div class="grid2">`;
          slide.cols.forEach(col => {
            html += `<div><h3>${esc(col.title)}</h3>`;
            if (col.bullets && col.bullets.length) {
              html += `<ul>${col.bullets.map(b => `<li>${esc(b)}</li>`).join('')}</ul>`;
            }
            if (col.codeBlocks) {
              col.codeBlocks.forEach(cb => {
                html += `<p style="color:var(--muted);font-size:14px;font-weight:600;margin:0.75rem 0 0.25rem">${esc(cb.label || '')}</p>`;
                html += `<div class="code"><pre><code class="language-${cb.lang || 'json'}">${esc(cb.text)}</code></pre></div>`;
              });
            }
            html += `</div>`;
          });
          html += `</div>`;
          if (slide.html) html += slide.html;
        } else if (layout === 'two-column' && slide.code) {
          html += `<h1>${esc(slide.title)}</h1>`;
          if (slide.subtitle) html += `<p style="color:var(--muted)">${esc(slide.subtitle)}</p>`;
          html += `<div class="grid2"><div>`;
          if (slide.bullets && slide.bullets.length) {
            html += `<ul>${slide.bullets.map(b => `<li>${esc(b)}</li>`).join('')}</ul>`;
          }
          html += `</div><div>`;
          html += `<div class="code"><pre><code class="language-${slide.code.lang || 'typescript'}">${esc(slide.code.text)}</code></pre></div>`;
          html += `</div></div>`;
        } else {
          html += `<h1>${esc(slide.title)}</h1>`;
          if (slide.subtitle) html += `<p style="color:var(--muted)">${esc(slide.subtitle)}</p>`;
          if (slide.bullets && slide.bullets.length) {
            html += `<ul>${slide.bullets.map(b => `<li>${esc(b)}</li>`).join('')}</ul>`;
          }
          if (slide.code) {
            html += `<div class="code" style="margin-top:1rem"><pre><code class="language-${slide.code.lang || 'typescript'}">${esc(slide.code.text)}</code></pre></div>`;
          }
          if (slide.svg) html += slide.svg;
          if (slide.html) html += slide.html;
        }

        const total = typeof SLIDES !== 'undefined' ? SLIDES.length : '?';
        html += `<span class="slide-num">${idx + 1} / ${total}</span>`;
        sec.innerHTML = html;
        deck.appendChild(sec);
      }

      if (typeof SLIDES !== 'undefined') {
        SLIDES.forEach(renderSlide);
        document.querySelectorAll('.code code').forEach(el => hljs.highlightElement(el));
        const qaLink = document.getElementById('qa-link');
        if (qaLink) qaLink.href = `#s${SLIDES.length}`;
      } else {
        deck.innerHTML = '<section class="slide active"><h1>Error</h1><p>Slides not loaded.</p></section>';
      }

      (function () {
        const total = typeof SLIDES !== 'undefined' ? SLIDES.length : 1;
        const byHash = () => {
          const h = (location.hash || '').replace('#', '');
          const m = h.match(/^s(\d+)$/);
          if (m) { const n = parseInt(m[1]); if (n >= 1 && n <= total) return n; }
          return 1;
        };
        const setUi = (n) => {
          document.querySelectorAll('section.slide').forEach((s, i) => {
            s.classList.toggle('active', i + 1 === n);
          });
          const prev = document.getElementById('prev');
          const next = document.getElementById('next');
          if (prev) prev.href = `#s${Math.max(1, n - 1)}`;
          if (next) next.href = `#s${Math.min(total, n + 1)}`;
          const pct = Math.round((n / total) * 100);
          const bar = document.getElementById('progress-bar');
          if (bar) bar.style.width = pct + '%';
        };
        const go = (delta) => {
          const n = byHash();
          const nn = Math.min(total, Math.max(1, n + delta));
          location.hash = `#s${nn}`;
        };
        window.addEventListener('hashchange', () => setUi(byHash()));
        window.addEventListener('keydown', (e) => {
          if (e.key === 'ArrowRight' || e.key === 'PageDown') go(+1);
          if (e.key === 'ArrowLeft' || e.key === 'PageUp') go(-1);
          if (e.key === 'Home') location.hash = '#s1';
          if (e.key === 'End') location.hash = `#s${total}`;
        });
        setUi(byHash());
      })();
    </script>
  </body>
</html>
